<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Chic Chic</title>
<style>
  :root{
    --bg:#171019; --bg2:#1f1622; --card:#241a2a; --line:rgba(255,255,255,0.08);
    --txt:#f3ecf4; --mut:#a99bb0; --faint:#766b7d;
    --red:#e8607a; --amber:#e8a24a; --teal:#4fc7a8; --pink:#d98bb0;
    --green:#7bd88f;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  body{min-height:100vh;min-height:100dvh;padding:env(safe-area-inset-top) 18px calc(env(safe-area-inset-bottom) + 28px);max-width:480px;margin:0 auto;overflow-x:hidden}
  .wrap{padding-top:22px}
  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .brand{display:flex;align-items:center;gap:9px;font-size:15px;font-weight:600;letter-spacing:.2px}
  .brand .moon{width:22px;height:22px;border-radius:50%;background:radial-gradient(circle at 32% 32%,#fbe9c9,#e8a24a 60%,#b9742f);box-shadow:0 0 14px rgba(232,162,74,.4)}
  .gear{width:38px;height:38px;border-radius:50%;border:1px solid var(--line);background:var(--card);color:var(--mut);display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer}
  .gear:active{transform:scale(.93)}

  .sync{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--faint);margin:0 2px 18px;height:14px}
  .sdot{width:7px;height:7px;border-radius:50%;background:var(--faint);flex:none}
  .sdot.ok{background:var(--green)} .sdot.err{background:var(--red)} .sdot.load{background:var(--amber);animation:pulse 1s infinite}
  @keyframes pulse{50%{opacity:.3}}

  .hero{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:2px 0 24px}
  .ring{position:relative;width:240px;height:240px}
  .ring svg{transform:rotate(-90deg)}
  .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 24px}
  .emoji{font-size:42px;line-height:1;margin-bottom:8px}
  .phase{font-size:25px;font-weight:700;letter-spacing:.2px}
  .dayline{font-size:13px;color:var(--mut);margin-top:9px}

  .quip{text-align:center;font-size:14.5px;line-height:1.55;color:var(--txt);background:var(--card);border:1px solid var(--line);border-radius:18px;padding:15px 18px;margin-bottom:14px}
  .quip b{font-weight:600}

  .chic{background:linear-gradient(135deg,rgba(232,96,122,.16),rgba(217,139,176,.10));border:1px solid rgba(232,96,122,.3);border-radius:18px;padding:15px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .chic-k{font-size:11px;color:var(--pink);text-transform:uppercase;letter-spacing:1.2px;font-weight:600;margin-bottom:5px}
  .chic-v{font-size:19px;font-weight:700;letter-spacing:.2px}
  .chic-sub{font-size:12px;color:var(--mut);margin-top:3px}
  .chic-btn{flex:none;background:linear-gradient(135deg,#e8607a,#d98bb0);color:#2a0d1a;border:none;border-radius:13px;padding:12px 16px;font-size:13.5px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap}
  .chic-btn:active{transform:scale(.95)}
  .chic-btn.done{background:transparent;color:var(--pink);border:1.5px solid var(--pink)}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 15px}
  .stat .k{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:6px;margin-bottom:7px}
  .stat .v{font-size:18px;font-weight:600;letter-spacing:.2px}
  .stat .v small{font-size:12.5px;font-weight:400;color:var(--mut)}
  .stat .sub{font-size:12px;color:var(--mut);margin-top:3px}

  .section-t{font-size:12px;color:var(--faint);text-transform:uppercase;letter-spacing:1.3px;margin:8px 2px 11px}

  .timeline{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px 16px 14px;margin-bottom:14px}
  .bar{display:flex;height:13px;border-radius:7px;overflow:hidden;margin-bottom:12px}
  .seg{height:100%}
  .marker{position:relative;height:0}
  .dot{position:absolute;top:-19px;width:14px;height:14px;border-radius:50%;background:#fff;border:3px solid var(--bg);box-shadow:0 0 0 2px #fff;transform:translateX(-50%)}
  .legend{display:flex;flex-wrap:wrap;gap:9px 14px;margin-top:4px}
  .lg{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--mut)}
  .sw{width:9px;height:9px;border-radius:3px}
